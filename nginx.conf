# ── Nginx — Triagem Smart ─────────────────────────────────────────────────────
# Copiar para: /etc/nginx/sites-available/triagem-smart
# Ativar com:  ln -s /etc/nginx/sites-available/triagem-smart /etc/nginx/sites-enabled/
# Testar:      nginx -t
# Recarregar:  systemctl reload nginx

server {
    listen 80;
    server_name triagemsmart.develoi.com.br;

    # Certbot preenchera automaticamente apos: certbot --nginx -d triagemsmart.develoi.com.br
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name triagemsmart.develoi.com.br;

    # SSL (preenchido pelo certbot)
    # ssl_certificate /etc/letsencrypt/live/triagemsmart.develoi.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/triagemsmart.develoi.com.br/privkey.pem;

    # Uploads de curriculos (max 50MB)
    client_max_body_size 50M;

    # Pasta de uploads servida diretamente (melhor performance)
    location /uploads/ {
        alias /var/www/triagem-smart/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Tudo mais vai para o Node (porta 3021)
    location / {
        proxy_pass         http://127.0.0.1:3021;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
